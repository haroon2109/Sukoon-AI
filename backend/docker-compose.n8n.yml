version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
      # Sukoon AI Backend Webhook Integration
      - SUKOON_BACKEND_URL=http://localhost:8080/api/v1/n8n
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
